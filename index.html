<DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio - Maria das Dores</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  background: #ea268c;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin-left: 10px;
  text-decoration: none;
}

/* SEÇÕES */
section {
  padding: 20px;
}

/* FOTO COM FUNDO */
.fundo-imagem {
  background-image: url("img/fundo.jpg");
  background-size: cover;
  background-position: center;
  height: 300px;

  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.fundo-imagem::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

#foto-perfil {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid white;
  position: relative;
  z-index: 1;
}
.item-galeria {
  text-align: center;
}

.item-galeria p {
  margin-top: 5px;
  font-size: 14px;
}
/* PROJETOS */
#lista-projetos {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  width: 250px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  max-width: 300px;
  gap: 10px;
}

input, button {
  padding: 10px;
}

button {
  background: #333;
  color: white;
  border: none;
}

/* GALERIA */
.galeria-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.galeria-container img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  header {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<body>

<header>
  <h1>Portfólio</h1>
  <nav>
    <a href="#sobre">Sobre</a>
    <a href="#projetos">Projetos</a>
    <a href="#galeria">Galeria</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<!-- IMAGEM -->
<section id="imagem">
  <div class="fundo-imagem">
    <img src="dasdores.jpg" id="foto-perfil">
  </div>
</section>

<!-- SOBRE -->
<section id="sobre">
  <h2>Sobre mim</h2>
  <p>Olá! Sou Maria das Dores, estudante do curso de Sistemas para Internet, polo São Félix do Piauí e também faço o curso de Pedagogia.
.</p>
</section>

<!-- PROJETOS -->
<section id="projetos">
  <h2>Meus Projetos</h2>
  <div id="lista-projetos"></div>
</section>

<!-- GALERIA -->
<section id="galeria">
  <h2>Galeria</h2>
  <div class="galeria-container" id="galeria-container"></div>
</section>

<!-- CONTATO -->
<section id="contato">
  <h2>Contato</h2>
  <form id="form-contato">
    <input type="text" id="nome" placeholder="Seu nome" required>
    <input type="email" id="email" placeholder="Seu email" required>
    <button type="submit">Enviar</button>
  </form>
  <p id="mensagem"></p>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <img id="imagem-modal">
</div>

<footer>
  <p>© 2026 - Maria das Dores</p>
</footer>

<script>
/* PROJETOS */
const projetos = [
  { nome: "Projeto 1", descricao: "Site em HTML e CSS" },
  { nome: "Projeto 2", descricao: "JavaScript básico" }
];

const lista = document.getElementById("lista-projetos");

projetos.forEach(p => {
  const div = document.createElement("div");
  div.classList.add("card");
  div.innerHTML = `<h3>${p.nome}</h3><p>${p.descricao}</p>`;
  lista.appendChild(div);
});

/* FORM */
const form = document.getElementById("form-contato");
const mensagem = document.getElementById("mensagem");

form.addEventListener("submit", e => {
  e.preventDefault();
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;

  mensagem.textContent = `Obrigado, ${nome}! Contato: ${email}`;
  form.reset();
});

/* GALERIA */
const imagens = [
];

const galeria = document.getElementById("galeria-container");

imagens.forEach(imgObj => {
  const div = document.createElement("div");
  div.classList.add("item-galeria");

  div.innerHTML = `
    <img src="${imgObj.src}" alt="${imgObj.titulo}">
    <p>${imgObj.titulo}</p>
  `;

  div.querySelector("img").addEventListener("click", () => {
    modal.style.display = "flex";
    imagemModal.src = imgObj.src;
  });

  galeria.appendChild(div);
});

/* MODAL */
const modal = document.getElementById("modal");
const imagemModal = document.getElementById("imagem-modal");

modal.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>

</body>
</html>
